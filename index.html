<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Remote Control</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --accent: #f0a500;
      --accent-dim: #7a5200;
      --green: #3fb950;
      --red: #f85149;
      --text: #e6edf3;
      --subtext: #8b949e;
    }

    body {
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 32px;
      width: 100%;
      max-width: 340px;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent), var(--accent-dim));
    }

    .label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--subtext);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--subtext);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .dot.on  { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.off { background: var(--red);   box-shadow: 0 0 8px var(--red); }

    .status-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--subtext);
      flex: 1;
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 14px 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--bg);
      color: var(--subtext);
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-on  { border-color: var(--green); }
    .btn-off { border-color: var(--red); }

    .btn-on:not(:disabled):hover  { background: var(--green); color: #000; box-shadow: 0 0 16px rgba(63,185,80,0.4); }
    .btn-off:not(:disabled):hover { background: var(--red);   color: #fff; box-shadow: 0 0 16px rgba(248,81,73,0.4); }

    .btn-on.active  { background: var(--green); color: #000; }
    .btn-off.active { background: var(--red);   color: #fff; }

    .log {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--subtext);
      line-height: 1.7;
      min-height: 48px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .ok  { color: var(--green); }
    .err { color: var(--red); }
    .inf { color: var(--accent); }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid var(--subtext);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="panel">
  <div class="label">Prodraulics / Eagle.io</div>
  <div class="title">REMOTE CONTROL</div>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <div class="status-text" id="statusText">— UNKNOWN</div>
  </div>

  <div class="btn-group">
    <button class="btn btn-on"  id="btnOn"  onclick="sendCommand(1)">▶ ON</button>
    <button class="btn btn-off" id="btnOff" onclick="sendCommand(0)">■ OFF</button>
  </div>

  <div class="log" id="log">Awaiting command...</div>
</div>

<script>
  const API_KEY = 'owe6PeGSGXSSifebVuvND5ilds0Aho4skuQTUsPn';
  const NODE_ID = '69c9f241c7b220923475b01b';

  const dot        = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  const log        = document.getElementById('log');
  const btnOn      = document.getElementById('btnOn');
  const btnOff     = document.getElementById('btnOff');

  function setLog(html) { log.innerHTML = html; }

  function setBusy(busy) {
    btnOn.disabled  = busy;
    btnOff.disabled = busy;
  }

  function updateUI(val) {
    dot.className = 'dot ' + (val === 1 ? 'on' : 'off');
    statusText.textContent = val === 1 ? '● REMOTE ON' : '○ REMOTE OFF';
    btnOn.classList.toggle('active',  val === 1);
    btnOff.classList.toggle('active', val === 0);
  }

  async function sendCommand(value) {
    setBusy(true);
    setLog(`<span class="spinner"></span> Sending ${value === 1 ? 'ON' : 'OFF'}...`);

    const body = {
      dataStreams: [{
        name: "value",
        dataPoints: [[new Date().toISOString(), value]]
      }]
    };

    try {
      const res = await fetch(`https://api.eagle.io/api/v1/nodes/${NODE_ID}/historic`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Api-Key': API_KEY
        },
        body: JSON.stringify(body)
      });

      if (res.ok || res.status === 204) {
        updateUI(value);
        setLog(`<span class="ok">✓ Command sent: ${value === 1 ? 'ON' : 'OFF'} @ ${new Date().toLocaleTimeString()}</span>`);
      } else {
        const txt = await res.text();
        setLog(`<span class="err">✗ HTTP ${res.status}: ${txt.slice(0,80)}</span>`);
      }
    } catch(e) {
      setLog(`<span class="err">✗ Network error: ${e.message}</span>`);
    }

    setBusy(false);
  }

  // Poll current state on load
  (async () => {
    try {
      const res = await fetch(`https://api.eagle.io/api/v1/nodes/${NODE_ID}`, {
        headers: { 'X-Api-Key': API_KEY }
      });
      const data = await res.json();
      const val = data?.currentValue?.v;
      if (val !== undefined) {
        updateUI(val);
        setLog(`<span class="inf">Loaded current state: ${val === 1 ? 'ON' : 'OFF'}</span>`);
      }
    } catch(e) {
      setLog(`<span class="err">Could not fetch current state.</span>`);
    }
  })();
</script>
</body>
</html>
